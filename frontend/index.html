<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Message Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">R</span>
        <div class="brand-text">
          <h1>Relay</h1>
          <p>Shared message board</p>
        </div>
      </div>
      <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Connecting…</span>
      </div>
    </header>

    <main class="board" id="board" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <p>No messages yet</p>
        <span>Send the first one below</span>
      </div>
    </main>

    <form class="composer" id="composer">
      <input
        type="text"
        id="messageInput"
        placeholder="Write a message…"
        autocomplete="off"
        maxlength="500"
      />
      <button type="submit" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path d="M3.4 20.6L21 12 3.4 3.4 3 10l12 2-12 2z" fill="currentColor"/>
        </svg>
      </button>
    </form>

  </div>

  <script src="script.js"></script>
</body>
</html>
